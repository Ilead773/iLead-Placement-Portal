services:
  - type: redis
    name: ilead-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow Render services

  - type: web
    name: ilead-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ilead-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ilead-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://ilead-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ilead-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ilead-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ilead-redis
          type: redis
          property: connectionString

  - type: web
    name: ilead-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ilead-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
databases:
  - name: ilead-postgres
    plan: free
